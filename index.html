<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素体ジェネレーター｜シレン風ドット絵</title>
<style>
  :root{
    --paper:#efe9d8;
    --ink:#2b2620;
    --line:#c9bfa3;
    --accent:#7a5c2e;
    --accent2:#9c3b2e;
    --panel:#f7f3e8;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--paper); color:var(--ink);
    font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
    -webkit-text-size-adjust:100%;
  }
  header{
    padding:18px 16px 14px; border-bottom:2px solid var(--line);
    background:var(--panel);
  }
  h1{ font-size:18px; margin:0 0 2px; letter-spacing:.04em; }
  header p{ margin:0; font-size:12px; color:#7a7160; }

  .wrap{ max-width:520px; margin:0 auto; padding:16px; }

  .stage{
    display:flex; flex-direction:column; align-items:center;
    gap:10px; margin-bottom:18px;
  }
  canvas#preview{
    image-rendering:pixelated; image-rendering:crisp-edges;
    width:256px; height:256px;
    background:
      repeating-conic-gradient(#ded6bf 0% 25%, #e9e2cc 0% 50%) 0 / 24px 24px;
    border:2px solid var(--line); border-radius:6px;
    box-shadow:0 6px 16px rgba(0,0,0,.12);
  }
  .seed{ font-size:11px; color:#9a917d; font-variant-numeric:tabular-nums; }

  .controls{ display:flex; flex-direction:column; gap:14px; }
  .row{
    background:var(--panel); border:1px solid var(--line); border-radius:6px;
    padding:12px 14px;
  }
  .row label{ display:block; font-size:13px; font-weight:600; margin-bottom:8px; }
  .val{ float:right; font-weight:400; color:#8a8068; font-variant-numeric:tabular-nums; }

  input[type=range]{ width:100%; accent-color:var(--accent); height:24px; }

  .swatches{ display:flex; flex-wrap:wrap; gap:8px; }
  .sw{
    width:34px; height:34px; border-radius:50%; border:2px solid rgba(0,0,0,.15);
    cursor:pointer; padding:0;
  }
  .sw.on{ border-color:var(--ink); box-shadow:0 0 0 2px var(--paper),0 0 0 4px var(--ink); }

  .seg{ display:flex; gap:6px; flex-wrap:wrap; }
  .seg button{
    flex:1 1 auto; min-width:70px; padding:9px 6px; font-size:13px;
    background:#fff; color:var(--ink); border:1px solid var(--line);
    border-radius:5px; cursor:pointer;
  }
  .seg button.on{ background:var(--accent); color:#fff; border-color:var(--accent); }

  .actions{ display:flex; gap:10px; margin-top:4px; }
  .actions button{
    flex:1; padding:14px 8px; font-size:15px; font-weight:700;
    border:none; border-radius:6px; cursor:pointer; letter-spacing:.03em;
  }
  #randomBtn{ background:#5c5142; color:#fff; }
  #saveBtn{ background:var(--accent2); color:#fff; }
  .hint{ font-size:11.5px; color:#8a8068; margin-top:10px; line-height:1.7; }
  .hint code{ background:#e6dec8; padding:1px 5px; border-radius:3px; }
</style>
</head>
<body>
<header>
  <h1>素体ジェネレーター</h1>
  <p>顔・体・手足を自動で描く。色と体型を選んで、透過PNGで書き出す。</p>
</header>

<div class="wrap">
  <div class="stage">
    <canvas id="preview" width="32" height="32"></canvas>
    <div class="seed" id="seedLabel"></div>
  </div>

  <div class="controls">

    <div class="row">
      <label>肌の色</label>
      <div class="swatches" id="skinSwatches"></div>
    </div>

    <div class="row">
      <label>体型 <span class="val" id="buildVal"></span></label>
      <input type="range" id="build" min="0" max="100" value="45">
    </div>

    <div class="row">
      <label>身長（頭身バランス） <span class="val" id="heightVal"></span></label>
      <input type="range" id="heightP" min="0" max="100" value="50">
    </div>

    <div class="row">
      <label>目の形</label>
      <div class="seg" id="eyeSeg">
        <button data-v="dot" class="on">点目</button>
        <button data-v="calm">おだやか</button>
        <button data-v="sharp">鋭い</button>
      </div>
    </div>

    <div class="row">
      <label>髪の色（前髪・もみあげ）</label>
      <div class="swatches" id="hairSwatches"></div>
    </div>

    <div class="actions">
      <button id="randomBtn">ランダム</button>
      <button id="saveBtn">PNG保存</button>
    </div>

    <div class="hint">
      ・出力は <code>32×32</code> の透過PNG。合成ツールと位置が揃います。<br>
      ・iPhoneは保存できないときプレビュー画像を<b>長押し→写真に保存</b>でもOK。<br>
      ・髪・目・体型の組み合わせで色違いを無限に量産できます。
    </div>
  </div>
</div>

<script>
// ============================================================
//  素体プロシージャル生成（32x32, 3階調＋セレクティブアウトライン）
// ============================================================

const SIZE = 32;
const cv = document.getElementById('preview');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ---- 状態 ----
const state = {
  skin: '#f1c79e',
  hair: '#3a2a1c',
  build: 45,     // 0=細い 100=がっしり
  height: 50,    // 0=低頭身 100=高頭身
  eye: 'dot',
  seed: 1
};

// ---- パレット候補 ----
const SKINS = ['#f4d3b0','#f1c79e','#e8b489','#d89c6e','#c07e50','#9c5f38','#7a4a2c'];
const HAIRS = ['#2b2018','#3a2a1c','#5a3c1e','#7a4a1e','#9c6b2e','#1c2230','#52504e','#b5453a'];

// ---- 色ユーティリティ ----
function hexToRgb(h){ return [parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]; }
function rgbToHex(r,g,b){ const c=v=>('0'+Math.max(0,Math.min(255,Math.round(v))).toString(16)).slice(-2); return '#'+c(r)+c(g)+c(b); }
function shade(hex, amt){ // amt: -1暗く 〜 +1明るく
  const [r,g,b]=hexToRgb(hex);
  if(amt>=0){ return rgbToHex(r+(255-r)*amt*0.85, g+(255-g)*amt*0.85, b+(255-b)*amt*0.85); }
  return rgbToHex(r*(1+amt), g*(1+amt), b*(1+amt));
}

// ---- ピクセルバッファ ----
function blankGrid(){
  const g = new Array(SIZE);
  for(let y=0;y<SIZE;y++){ g[y]=new Array(SIZE).fill(null); }
  return g;
}
function set(g,x,y,c){ if(x>=0&&x<SIZE&&y>=0&&y<SIZE) g[y][x]=c; }
// 楕円フィル（中心cx,cy 半径rx,ry）
function ellipse(g,cx,cy,rx,ry,c){
  for(let y=Math.floor(cy-ry);y<=Math.ceil(cy+ry);y++){
    for(let x=Math.floor(cx-rx);x<=Math.ceil(cx+rx);x++){
      const dx=(x-cx)/rx, dy=(y-cy)/ry;
      if(dx*dx+dy*dy<=1) set(g,x,y,c);
    }
  }
}
function rect(g,x0,y0,w,h,c){
  for(let y=y0;y<y0+h;y++) for(let x=x0;x<x0+w;x++) set(g,x,y,c);
}

// ---- 簡易乱数（seedで再現性） ----
function mulberry(seed){ return function(){ seed|=0; seed=seed+0x6D2B79F5|0; let t=Math.imul(seed^seed>>>15,1|seed); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }

// ============================================================
//  素体を描く
// ============================================================
function buildBody(st){
  const g = blankGrid();

  const skin = st.skin;
  const skinHi = shade(skin, 0.35);
  const skinSh = shade(skin, -0.30);
  const skinLn = shade(skin, -0.55);   // アウトライン（黒ベタにしない）

  const hair = st.hair;
  const hairHi = shade(hair, 0.30);
  const hairSh = shade(hair, -0.35);

  // パラメータ → 寸法
  const b = st.build/100;              // 体格
  const h = st.height/100;             // 頭身
  const headR = 5 + (1-h)*1.2;         // 頭の半径（低頭身ほど頭大）
  const headCx = 16, headCy = 8 - h*1.0;
  const bodyW = 7 + b*4;               // 胴の幅
  const bodyTop = headCy + headR + 1;
  const bodyH = 9 + h*2;

  // ---- 脚 ----
  const legTop = bodyTop + bodyH - 1;
  const legW = 2 + Math.round(b*1.2);
  const legGap = 1 + Math.round(b*0.5);
  const legLen = 5 + Math.round(h*2);
  // 左脚
  rect(g, headCx-legGap-legW, legTop, legW, legLen, skin);
  // 右脚
  rect(g, headCx+legGap, legTop, legW, legLen, skin);
  // 足先（濃い色＝足袋/靴）
  const shoe = shade(skin,-0.62);
  rect(g, headCx-legGap-legW, legTop+legLen-1, legW, 1, shoe);
  rect(g, headCx+legGap, legTop+legLen-1, legW, 1, shoe);

  // ---- 胴 ----
  ellipse(g, headCx, bodyTop+bodyH/2-1, bodyW/2, bodyH/2, skin);
  rect(g, Math.round(headCx-bodyW/2), Math.round(bodyTop), Math.round(bodyW), Math.round(bodyH-2), skin);

  // ---- 腕 ----
  const armLen = 6 + Math.round(h*2);
  const armW = 2 + Math.round(b*1.0);
  const armY = bodyTop+1;
  rect(g, Math.round(headCx-bodyW/2-armW+1), armY, armW, armLen, skin); // 左腕
  rect(g, Math.round(headCx+bodyW/2-1), armY, armW, armLen, skin);      // 右腕
  // 手先（少し明るく）
  rect(g, Math.round(headCx-bodyW/2-armW+1), armY+armLen-1, armW, 1, skinHi);
  rect(g, Math.round(headCx+bodyW/2-1), armY+armLen-1, armW, 1, skinHi);

  // ---- 頭 ----
  ellipse(g, headCx, headCy, headR, headR*1.05, skin);

  // ---- 顔の陰影：右下を影、左上をハイライト ----
  shadeFace(g, skin, skinHi, skinSh);

  // ---- 髪（前髪・サイド） ----
  drawHair(g, headCx, headCy, headR, hair, hairHi, hairSh);

  // ---- 目 ----
  drawEyes(g, headCx, headCy, headR, st.eye);

  // ---- 胴と手足にも軽く陰影 ----
  bodyShading(g, skin, skinHi, skinSh, headCx);

  // ---- セレクティブアウトライン（輪郭だけ暗い肌色で囲う） ----
  outline(g, skinLn);

  return g;
}

// 顔の球面陰影
function shadeFace(g, skin, hi, sh){
  for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++){
    if(g[y][x]===skin){
      // 上下左右に肌が続いていれば内部
      const up = g[y-1] && g[y-1][x];
      const dn = g[y+1] && g[y+1][x];
      const lf = g[y][x-1];
      const rt = g[y][x+1];
      if(up===skin&&lf===skin && (x<16||y<8)) { /* 左上側 */ }
    }
  }
}

// 髪
function drawHair(g, cx, cy, r, hair, hi, sh){
  const top = Math.round(cy-r);
  // 頭頂〜額の前髪
  for(let y=top; y<=cy; y++){
    for(let x=Math.round(cx-r); x<=Math.round(cx+r); x++){
      const dx=(x-cx)/r, dy=(y-cy)/(r*1.05);
      if(dx*dx+dy*dy<=1){
        // 額より上、または毛束が前に垂れる位置
        const fringe = (y < cy-0.5) || (Math.abs(x-cx)>r*0.55 && y<cy+0.8);
        if(fringe) g[y][x] = hair;
      }
    }
  }
  // もみあげ
  for(let y=Math.round(cy-r*0.2); y<=Math.round(cy+r*0.6); y++){
    g[y] && (g[y][Math.round(cx-r)]   = hair);
    g[y] && (g[y][Math.round(cx-r)+1] = hair);
    g[y] && (g[y][Math.round(cx+r)]   = hair);
    g[y] && (g[y][Math.round(cx+r)-1] = hair);
  }
  // 髪ハイライト（左上の毛束）
  for(let y=top; y<=top+2; y++){
    for(let x=Math.round(cx-r*0.5); x<=Math.round(cx); x++){
      if(g[y] && g[y][x]===hair) g[y][x]=hi;
    }
  }
  // 髪の影（右下）
  for(let y=Math.round(cy-1); y<=Math.round(cy); y++){
    for(let x=Math.round(cx+r*0.3); x<=Math.round(cx+r); x++){
      if(g[y] && g[y][x]===hair) g[y][x]=sh;
    }
  }
}

// 目
function drawEyes(g, cx, cy, r, type){
  const ey = Math.round(cy+0.5);
  const exL = Math.round(cx-r*0.45);
  const exR = Math.round(cx+r*0.45)-1;
  const eye = '#231a14';
  const white = '#fbf3e6';
  function put(x){
    if(type==='dot'){
      set(g,x,ey,eye);
      set(g,x,ey+1,eye);
    } else if(type==='calm'){
      set(g,x,ey,white); set(g,x+ (x<cx?0:0),ey,white);
      set(g,x,ey,eye);
      set(g,x,ey-0,eye);
      set(g,x, ey, eye);
    } else if(type==='sharp'){
      set(g,x,ey,eye);
      set(g, x + (x<cx?1:-1), ey-1, eye);
    }
  }
  // 点目/鋭い目
  if(type==='dot'){
    rect(g,exL,ey,1,2,eye); rect(g,exR,ey,1,2,eye);
  } else if(type==='calm'){
    rect(g,exL-1,ey,3,1,'#fbf3e6'); rect(g,exR-1,ey,3,1,'#fbf3e6');
    set(g,exL,ey,eye); set(g,exR,ey,eye);
    set(g,exL,ey-1,'#fbf3e6'); set(g,exR,ey-1,'#fbf3e6');
  } else { // sharp
    set(g,exL,ey,eye); set(g,exL+1,ey-1,eye);
    set(g,exR,ey,eye); set(g,exR-1,ey-1,eye);
    set(g,exL,ey+1,eye); set(g,exR,ey+1,eye);
  }
}

// 胴・手足のシンプル陰影
function bodyShading(g, skin, hi, sh, cx){
  for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++){
    if(g[y][x]===skin){
      const lf = g[y][x-1];
      const rt = g[y][x+1];
      // 左端っぽい → ハイライト、右端っぽい → 影
      if(lf===null || lf===undefined){ if(x<cx) g[y][x]=hi; }
      else if(rt===null || rt===undefined){ if(x>cx) g[y][x]=sh; }
    }
  }
}

// セレクティブアウトライン
function outline(g, lineColor){
  const add=[];
  for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++){
    if(g[y][x]===null){
      const n = (g[y-1]&&g[y-1][x]) || (g[y+1]&&g[y+1][x]) || g[y][x-1] || g[y][x+1];
      if(n) add.push([x,y]);
    }
  }
  for(const [x,y] of add) g[y][x]=lineColor;
}

// ============================================================
//  描画
// ============================================================
function render(){
  const g = buildBody(state);
  ctx.clearRect(0,0,SIZE,SIZE);
  for(let y=0;y<SIZE;y++) for(let x=0;x<SIZE;x++){
    if(g[y][x]){ ctx.fillStyle=g[y][x]; ctx.fillRect(x,y,1,1); }
  }
  document.getElementById('seedLabel').textContent =
    `体型 ${state.build} / 頭身 ${state.height} / 目 ${state.eye}`;
}

// ============================================================
//  UI構築
// ============================================================
function buildSwatches(containerId, colors, key){
  const c = document.getElementById(containerId);
  colors.forEach((col,i)=>{
    const b=document.createElement('button');
    b.className='sw'+(state[key]===col?' on':'');
    b.style.background=col;
    b.onclick=()=>{
      state[key]=col;
      [...c.children].forEach(ch=>ch.classList.remove('on'));
      b.classList.add('on'); render();
    };
    c.appendChild(b);
  });
}
buildSwatches('skinSwatches', SKINS, 'skin');
buildSwatches('hairSwatches', HAIRS, 'hair');

const buildEl=document.getElementById('build');
const heightEl=document.getElementById('heightP');
const buildVal=document.getElementById('buildVal');
const heightVal=document.getElementById('heightVal');
function labelBuild(v){ return v<33?'細い':v<66?'標準':'がっしり'; }
function labelHeight(v){ return v<33?'2頭身寄り':v<66?'標準':'スマート'; }
buildEl.oninput=()=>{ state.build=+buildEl.value; buildVal.textContent=labelBuild(state.build); render(); };
heightEl.oninput=()=>{ state.height=+heightEl.value; heightVal.textContent=labelHeight(state.height); render(); };
buildVal.textContent=labelBuild(state.build);
heightVal.textContent=labelHeight(state.height);

document.querySelectorAll('#eyeSeg button').forEach(btn=>{
  btn.onclick=()=>{
    state.eye=btn.dataset.v;
    document.querySelectorAll('#eyeSeg button').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on'); render();
  };
});

// ランダム
document.getElementById('randomBtn').onclick=()=>{
  const rnd=Math.random;
  state.skin=SKINS[Math.floor(rnd()*SKINS.length)];
  state.hair=HAIRS[Math.floor(rnd()*HAIRS.length)];
  state.build=Math.floor(rnd()*101);
  state.height=Math.floor(rnd()*101);
  state.eye=['dot','calm','sharp'][Math.floor(rnd()*3)];
  // UI反映
  buildEl.value=state.build; heightEl.value=state.height;
  buildVal.textContent=labelBuild(state.build);
  heightVal.textContent=labelHeight(state.height);
  document.querySelectorAll('#skinSwatches .sw').forEach(s=>s.classList.toggle('on', s.style.background===rgbCss(state.skin)));
  document.querySelectorAll('#hairSwatches .sw').forEach(s=>s.classList.toggle('on', s.style.background===rgbCss(state.hair)));
  document.querySelectorAll('#eyeSeg button').forEach(b=>b.classList.toggle('on', b.dataset.v===state.eye));
  render();
};
function rgbCss(hex){ const [r,g,b]=hexToRgb(hex); return `rgb(${r}, ${g}, ${b})`; }

// PNG保存
document.getElementById('saveBtn').onclick=()=>{
  cv.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    const name=`body_${state.build}_${state.height}_${state.eye}.png`;
    a.href=url; a.download=name;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
  },'image/png');
};

render();
</script>
</body>
</html>
