<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Sprite Studio v3 - Offline</title>

<style>
body { font-family: sans-serif; margin:0; background:#111; color:#eee; }
header { padding:10px; background:#222; }
#app { padding:10px; }

.drop {
  border:2px dashed #555;
  padding:20px;
  text-align:center;
  margin-bottom:10px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,80px);
  gap:6px;
}

.thumb {
  width:80px;
  height:80px;
  object-fit:contain;
  background:#000;
  border:1px solid #333;
}

button {
  margin:4px;
  padding:6px 10px;
}

canvas { display:none; }
</style>
</head>

<body>

<header>
Sprite Studio v3 (Offline Single File)
</header>

<div id="app">

<div class="drop" id="drop">
画像をドラッグ or クリック
<input type="file" id="file" multiple accept="image/*" style="display:none">
</div>

<div>
<button onclick="makeSheet()">スプライト生成</button>
<button onclick="downloadPNG()">PNG出力</button>
<button onclick="downloadJSON()">JSON出力</button>
</div>

<div class="grid" id="preview"></div>

<canvas id="canvas"></canvas>

</div>

<script>
let images = [];

const fileInput = document.getElementById('file');
const drop = document.getElementById('drop');
const preview = document.getElementById('preview');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

drop.onclick = () => fileInput.click();

fileInput.onchange = e => loadFiles(e.target.files);

// DnD
drop.ondragover = e => { e.preventDefault(); };
drop.ondrop = e => {
  e.preventDefault();
  loadFiles(e.dataTransfer.files);
};

function loadFiles(files){
  for (let f of files){
    const url = URL.createObjectURL(f);
    const img = new Image();
    img.onload = () => {
      images.push(img);
      renderThumb(img);
    };
    img.src = url;
  }
}

function renderThumb(img){
  const el = document.createElement('img');
  el.className = 'thumb';
  el.src = img.src;
  preview.appendChild(el);
}

function makeSheet(){
  if(images.length === 0) return;

  const size = 32;
  const cols = Math.ceil(Math.sqrt(images.length));
  const rows = Math.ceil(images.length / cols);

  canvas.width = cols * size;
  canvas.height = rows * size;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  images.forEach((img, i) => {
    const x = (i % cols) * size;
    const y = Math.floor(i / cols) * size;

    ctx.drawImage(img, x, y, size, size);
  });

  alert("Sprite sheet生成完了");
}

function downloadPNG(){
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'spritesheet.png';
    a.click();
  });
}

function downloadJSON(){
  const size = 32;
  const cols = Math.ceil(Math.sqrt(images.length));
  const rows = Math.ceil(images.length / cols);

  const data = {
    frameWidth: size,
    frameHeight: size,
    columns: cols,
    rows: rows
  };

  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'spritesheet.json';
  a.click();
}
</script>

</body>
</html>
