<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase3 ドット絵合成ツール（カテゴリ配列版）</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="panels">
<h2>Phase 3 ドット絵合成ツール</h2>

<div class="preview-wrap">
    <canvas id="mainCanvas" width="32" height="32"></canvas>
</div>

<!-- パネルは engine.js が CATEGORIES から自動生成してここに入れる -->
<div id="panelRoot"></div>

<div class="btn-row">
    <button class="btn-rand" onclick="randomize()">🎲 ランダム</button>
    <button class="btn-save" onclick="saveImage()">💾 PNG保存</button>
</div>

<div class="info">
    <span style="color:#aaa">見下ろし視点・コンパクト体型(実測ベース)</span><br>
    <span style="color:#ff6b6b">■</span> 武器ジョイント X=8,Y=21&nbsp;
    <span style="color:#4dabf7">■</span> 盾ジョイント X=23,Y=21
</div>
</div>

<!-- 読み込み順: base→helper→各パーツ→config→engine（依存関係順） -->
<script src="js/base.js"></script>
<script src="js/helper.js"></script>
<script src="js/hair.js"></script>
<script src="js/bottoms.js"></script>
<script src="js/tops.js"></script>
<script src="js/shoes.js"></script>
<script src="js/weapon.js"></script>
<script src="js/shield.js"></script>
<script src="js/eyes.js"></script>
<script src="js/config.js"></script>
<script src="js/engine.js"></script>
</body>
</html>
