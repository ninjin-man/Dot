<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ドット絵アバター量産ツール（パーツ組み合わせテスト）</title>
    <style>
        body {
            background-color: #2c2c2c;
            color: white;
            font-family: sans-serif;
            text-align: center;
            padding-top: 50px;
        }
        /* ドット絵がぼやけないようにする魔法のCSS */
        canvas {
            background-color: #f4ecd8;
            image-rendering: pixelated; /* ピクセルをくっきりさせる */
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            border-radius: 8px;
            margin-bottom: 20px;
        }
        button {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background-color: #45a049;
        }
        p {
            color: #aaa;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <h2>和風アバター量産ジェネレーター</h2>
    <p>AIは不使用。パーツの色や有無をプログラムでランダムに重ね合わせています。</p>

    <canvas id="canvas" width="64" height="64" style="width: 256px; height: 256px;"></canvas>
    <br>
    
    <button onclick="generateAvatar()">新しいキャラを量産する</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        // ① パーツのバリエーションを定義
        const hairColors = ["#1a1a1a", "#5c3a21", "#4a5e82", "#8b2e2e"]; // 黒、茶、紺、赤
        const clothesColors = ["#5c7b99", "#8c4444", "#486b48", "#333333"]; // 水色、えんじ、緑、黒
        const skinColor = "#ffcc99"; // 肌色

        // ② キャラクターを描画するメイン関数
        function generateAvatar() {
            // キャンバスを一旦クリア
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // ランダムにパーツの色や有無を決定（ガチャ）
            const hairColor = hairColors[Math.floor(Math.random() * hairColors.length)];
            const clothColor = clothesColors[Math.floor(Math.random() * clothesColors.length)];
            const hasSword = Math.random() > 0.5; // 50%の確率で刀を持たせる
            const isLongHair = Math.random() > 0.5; // 50%の確率で長髪にする

            // ③ 下から順番にパーツを描いていく（重ね合わせ）

            // [1. 素体] 顔と体と足
            ctx.fillStyle = skinColor;
            ctx.fillRect(24, 16, 16, 16); // 顔
            ctx.fillRect(28, 32, 8, 20);  // 体
            ctx.fillRect(24, 52, 4, 8);   // 足(左)
            ctx.fillRect(36, 52, 4, 8);   // 足(右)

            // [2. 服] 着物
            ctx.fillStyle = clothColor;
            ctx.fillRect(20, 32, 24, 16); // 胴体部分
            ctx.fillRect(18, 48, 28, 6);  // 裾（すそ）
            
            // 帯（赤で固定）
            ctx.fillStyle = "#b32424";
            ctx.fillRect(20, 42, 24, 4);

            // [3. 髪型]
            ctx.fillStyle = hairColor;
            ctx.fillRect(22, 12, 20, 8);  // 頭頂部・前髪
            ctx.fillRect(20, 16, 4, 16);  // もみあげ(左)
            ctx.fillRect(40, 16, 4, 16);  // もみあげ(右)
            
            // 長髪の場合の追加パーツ
            if (isLongHair) {
                ctx.fillRect(16, 24, 4, 16); // 後ろ髪
                ctx.fillRect(44, 24, 4, 16); // 後ろ髪
            }

            // [4. 武器]
            if (hasSword) {
                // 刀の刃
                ctx.fillStyle = "#cccccc"; 
                ctx.fillRect(12, 36, 16, 4);
                // 刀の柄（つか）
                ctx.fillStyle = "#1a1a1a"; 
                ctx.fillRect(28, 36, 4, 4);
            }

            // [5. 顔のパーツ] 目
            ctx.fillStyle = "#1a1a1a";
            ctx.fillRect(28, 24, 2, 2); // 左目
            ctx.fillRect(34, 24, 2, 2); // 右目
        }

        // ページを開いた時に最初の1体を描画しておく
        generateAvatar();
    </script>
</body>
</html>
