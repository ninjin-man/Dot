<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>シレン風ドット絵 パーツ合成ジェネレーター</title>
    <style>
        body { background: #2c2c2c; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        canvas { 
            background: #e0d8c0; /* 和風の和紙っぽい背景色 */
            image-rendering: pixelated; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
            border: 2px solid #555; 
            border-radius: 4px;
            margin: 10px;
        }
        .canvas-container { display: flex; flex-wrap: wrap; justify-content: center; max-width: 800px; margin: 0 auto; }
        button { background: #4CAF50; color: white; border: none; padding: 12px 24px; font-size: 18px; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 20px;}
        button:hover { background: #45a049; }
    </style>
</head>
<body>

    <h2>風来のシレン風 パーツ合成ツール</h2>
    <p>文字配列で作られた「素体」「服」「頭」「武器」「盾」のパーツを重ね合わせています。</p>
    <button onclick="generateAll()">仲間を量産する</button>

    <div class="canvas-container" id="output"></div>

<script>
    // ① カラーパレットの定義（記号と色の対応表）
    const P = {
        '.': null,        // 透明
        'X': '#111111',   // 主線（黒）
        'S': '#f4c4a0',   // 肌色
        'E': '#000000',   // 目
        'W': '#ffffff',   // 白
        'R': '#d63031',   // 赤（帯やスカーフ）
        'B': '#0984e3',   // 青（道着）
        'L': '#74b9ff',   // 水色（道着の縞模様）
        'G': '#00b894',   // 緑（別の道着色）
        'H': '#e1b12c',   // 笠（かさ）の竹の色
        'D': '#8A5A2B',   // 濃い茶色（靴など）
        'I': '#dfe6e9',   // 鉄（刀や盾）
        'M': '#636e72',   // 鉄の影
        'W': '#cd853f'    // 木（杖）
    };

    // ② パーツごとのドット絵データ（16x16ピクセル）
    // 文字を変えるだけで、あなた自身でドット絵を編集できます。

    const bodies = [
        [ // [素体] 基本の立ち姿
            "................",
            "................",
            "......XXXX......",
            ".....XSSSSX.....",
            ".....XSESEX.....",
            ".....XSSSSX.....",
            "......XXXX......",
            ".......XX.......",
            "......XXXX......",
            ".....XXXXXX.....",
            ".....XXXXXX.....",
            ".....X....X.....",
            "....XSX..XSX....",
            "....XXX..XXX....",
            "....XDX..XDX....",
            "....XXX..XXX...."
        ]
    ];

    const clothes = [
        [ // [服A] シレン風の縞模様の道着
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "......XXXX......",
            ".....XRRRRX.....",
            "....XBLBLBX.....",
            "...XLBLBLBLX....",
            "...XBLBLBLBX....",
            "...XXXXXXXXX....",
            "................",
            "................",
            "................",
            "................"
        ],
        [ // [服B] 緑色の旅装束
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "......XXXX......",
            ".....XRRRRX.....",
            "....XGGGGGGX....",
            "...XGGGGGGGGX...",
            "...XGGGGGGGGX...",
            "...XXXXXXXXXX...",
            "................",
            "................",
            "................",
            "................"
        ]
    ];

    const heads = [
        [ // [頭A] 三度笠（シレン風の大きな帽子）
            "................",
            "......XXXX......",
            "....XXHHHHXX....",
            "...XHHHHHHHHX...",
            "..XHHHHHHHHHHX..",
            "..XXXXXXXXXXXX..",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................"
        ],
        [ // [頭B] ハチマキ
            "................",
            "................",
            "......XXXX......",
            ".....XWWWWX.....",
            "....XXWWWWXX....",
            "....X.XXXX.X....",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................"
        ],
        [ // [頭C] なし（素体の頭そのまま）
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................"
        ]
    ];

    const rightHands = [
        [ // [右手A] 刀
            "........XXX.....",
            ".......XIIX.....",
            ".......XIIX.....",
            ".......XIIX.....",
            ".......XIIX.....",
            ".......XIIX.....",
            "......XXXXXX....",
            ".......XDDX.....",
            ".......XXXX.....",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................"
        ],
        [ // [右手B] 木の杖
            "........XX......",
            ".......XWWX.....",
            ".......XWWX.....",
            ".......XWWX.....",
            ".......XWWX.....",
            ".......XWWX.....",
            ".......XWWX.....",
            ".......XWWX.....",
            ".......XXXX.....",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................"
        ],
        [ // [右手C] 手ぶら
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................"
        ]
    ];

    const leftHands = [
        [ // [左手A] 丸盾
            "................",
            "................",
            "................",
            "................",
            "................",
            "...........XXXX.",
            "..........XBBBBX",
            ".........XBBWBBX",
            ".........XBBBBX.",
            "..........XXXX..",
            "................",
            "................",
            "................",
            "................",
            "................",
            "................"
        ],
        [ // [左手B] なし
            "................",
            "................",
            "................",
            "................",
            "................",
            "................",

            "................",
            "................",
            "................",
            "................",
            "................",
            "................"
        ]
    ];

    // ③ 文字配列をCanvasに描画する関数
    function drawPart(ctx, partArray) {
        const pixelSize = 8; // 1ドットを8ピクセルとして描画（16x8=128px）
        for (let y = 0; y < 16; y++) {
            for (let x = 0; x < 16; x++) {
                const char = partArray[y][x];
                const color = P[char];
                if (color) {
                    ctx.fillStyle = color;
                    ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
                }
            }
        }
    }

    // ④ キャラクターを1体生成する関数
    function createCharacter(container) {
        const canvas = document.createElement('canvas');
        canvas.width = 128; // 16 * 8
        canvas.height = 128;
        const ctx = canvas.getContext('2d');

        // ガチャ（ランダムにパーツを選ぶ）
        const body = bodies[0];
        const cloth = clothes[Math.floor(Math.random() * clothes.length)];
        const head = heads[Math.floor(Math.random() * heads.length)];
        const rightHand = rightHands[Math.floor(Math.random() * rightHands.length)];
        const leftHand = leftHands[Math.floor(Math.random() * leftHands.length)];

        // 下から順番に重ねて描画する（これがスプライト合成の極意です）
        drawPart(ctx, body);
        drawPart(ctx, cloth);
        drawPart(ctx, head);
        drawPart(ctx, rightHand);
        drawPart(ctx, leftHand);

        container.appendChild(canvas);
    }

    // 10体まとめて量産する
    function generateAll() {
        const container = document.getElementById('output');
        container.innerHTML = ""; // 一旦クリア
        for(let i=0; i<10; i++) {
            createCharacter(container);
        }
    }

    // 最初から表示しておく
    generateAll();
</script>
</body>
</html>
