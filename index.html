<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Sprite Studio v3 FULL</title>

<style>
body { margin:0; font-family:sans-serif; background:#111; color:#eee; }

header { padding:10px; background:#222; }

#app { display:flex; height:calc(100vh - 40px); }

.panel { padding:10px; overflow:auto; }
.left { width:25%; border-right:1px solid #333; }
.center { width:50%; border-right:1px solid #333; }
.right { width:25%; }

.drop {
  border:2px dashed #555;
  padding:10px;
  text-align:center;
  margin-bottom:10px;
}

.thumb {
  width:70px; height:70px;
  object-fit:contain;
  border:1px solid #333;
  margin:2px;
  cursor:pointer;
}

.slot {
  width:60px; height:60px;
  border:1px solid #555;
  display:inline-block;
  margin:2px;
  background:#000;
}

.tree { font-size:13px; }
.node { margin-left:10px; cursor:pointer; }
.active { color:yellow; }

button, select {
  margin:3px;
  padding:5px;
}

canvas { display:none; }
.small { font-size:11px; opacity:0.7; }
</style>
</head>

<body>

<header>
Sprite Studio v3 FULL
</header>

<div id="app">

<!-- LEFT -->
<div class="panel left">

<div class="drop" id="drop">Drop Images</div>
<input type="file" id="file" multiple style="display:none">

<div class="small">画像一覧</div>
<div id="thumbs"></div>

</div>

<!-- CENTER -->
<div class="panel center">

<!-- MENU -->
<div>
<select id="modeSelect" onchange="switchMode()">
<option value="sprite">Sprite Mode</option>
<option value="monster">Monster Mode</option>
<option value="item">Item Mode</option>
</select>

<select id="stateSelect" onchange="setState()">
<option>idle</option>
<option>walk</option>
<option>attack</option>
<option>hit</option>
<option>death</option>
</select>

<select id="dirSelect" onchange="setDir()">
<option>down</option>
<option>left</option>
<option>right</option>
<option>up</option>
</select>
</div>

<div>
<button onclick="build()">Build</button>
<button onclick="exportPNG()">PNG</button>
<button onclick="exportJSON()">JSON</button>
<button onclick="togglePixel()">Pixel Mode</button>
</div>

<div id="grid"></div>

<canvas id="canvas"></canvas>

</div>

<!-- RIGHT -->
<div class="panel right">
<div class="tree" id="tree"></div>
</div>

</div>

<script>

/* =========================
   STATE CORE
========================= */

let images = [];
let selected = null;

let mode = "sprite";
let pixelMode = false;

const states = ["idle","walk","attack","hit","death"];
const dirs = ["down","left","right","up"];

let data = {};

let activeState = "idle";
let activeDir = "down";

init();

function init(){
  for(let s of states){
    data[s] = {};
    for(let d of dirs){
      data[s][d] = [];
    }
  }
}

/* =========================
   FILE LOAD
========================= */

const drop = document.getElementById('drop');
const file = document.getElementById('file');
const thumbs = document.getElementById('thumbs');

drop.onclick = () => file.click();

file.onchange = e => load(e.target.files);

drop.ondragover = e => e.preventDefault();
drop.ondrop = e => {
  e.preventDefault();
  load(e.dataTransfer.files);
};

function load(files){
  for(let f of files){
    const url = URL.createObjectURL(f);
    const img = new Image();
    img.onload = () => {
      images.push(img);
      renderThumb(img);
    };
    img.src = url;
  }
}

function renderThumb(img){
  const el = document.createElement('img');
  el.src = img.src;
  el.className = 'thumb';

  el.onclick = () => selected = img;

  thumbs.appendChild(el);
}

/* =========================
   UI STATE CONTROL
========================= */

function switchMode(){
  mode = document.getElementById('modeSelect').value;
}

function setState(){
  activeState = document.getElementById('stateSelect').value;
  renderGrid();
}

function setDir(){
  activeDir = document.getElementById('dirSelect').value;
  renderGrid();
}

/* =========================
   GRID SYSTEM
========================= */

const grid = document.getElementById('grid');

function renderGrid(){
  grid.innerHTML = "";

  let list = data[activeState][activeDir];

  for(let i=0;i<8;i++){
    const slot = document.createElement('div');
    slot.className = 'slot';

    if(list[i]){
      slot.style.backgroundImage = `url(${list[i].src})`;
      slot.style.backgroundSize = "cover";
    }

    slot.onclick = () => {
      if(!selected) return;

      list[i] = selected;

      // mirror system
      if(activeDir === "left"){
        data[activeState]["right"][i] = selected;
      }
      if(activeDir === "right"){
        data[activeState]["left"][i] = selected;
      }

      renderGrid();
      renderTree();
    };

    grid.appendChild(slot);
  }

  renderTree();
}

/* =========================
   TREE VIEW
========================= */

const tree = document.getElementById('tree');

function renderTree(){
  tree.innerHTML = "";

  for(let s of states){
    const sNode = document.createElement('div');
    sNode.innerHTML = "▶ " + s;

    for(let d of dirs){
      const dNode = document.createElement('div');
      dNode.className = "node";
      dNode.innerHTML = `- ${d} (${data[s][d].length})`;

      dNode.onclick = () => {
        activeState = s;
        activeDir = d;
        document.getElementById('stateSelect').value = s;
        document.getElementById('dirSelect').value = d;
        renderGrid();
      };

      sNode.appendChild(dNode);
    }

    tree.appendChild(sNode);
  }
}

/* =========================
   BUILD SPRITE SHEET
========================= */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

function build(){

  const size = 32;
  const frames = 8;

  canvas.width = frames * size;
  canvas.height = states.length * dirs.length * size;

  ctx.clearRect(0,0,canvas.width,canvas.height);

  let y = 0;

  for(let s of states){
    for(let d of dirs){

      let list = data[s][d];

      // auto fill (重要)
      for(let i=0;i<frames;i++){
        if(!list[i]){
          list[i] = list[0] || null;
        }
      }

      for(let i=0;i<frames;i++){
        if(list[i]){
          ctx.drawImage(list[i], i*size, y, size, size);
        }
      }

      y += size;
    }
  }

  alert("Build Complete");
}

/* =========================
   EXPORT PNG
========================= */

function exportPNG(){
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = "spritesheet.png";
    a.click();
  });
}

/* =========================
   EXPORT JSON (GAME READY)
========================= */

function exportJSON(){

  const out = {
    frameWidth:32,
    frameHeight:32,
    animations:{}
  };

  for(let s of states){
    for(let d of dirs){
      const key = `${s}_${d}`;
      out.animations[key] = data[s][d].map((_,i)=>i);
    }
  }

  const blob = new Blob([JSON.stringify(out,null,2)], {type:"application/json"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = "sprite.json";
  a.click();
}

/* =========================
   PIXEL MODE (簡易トグル)
========================= */

function togglePixel(){
  pixelMode = !pixelMode;
  alert("Pixel Mode: " + pixelMode);
}

/* INIT */
renderGrid();
renderTree();

</script>

</body>
</html>
