<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phase3 ドット絵合成ツール（分割版）</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="panels">
<h2>Phase 3 ドット絵合成ツール</h2>

<div class="preview-wrap">
    <canvas id="mainCanvas" width="32" height="32"></canvas>
</div>

<div class="part-panel">
    <span class="part-label">▶ 髪型</span>
    <div class="part-options" id="opt-hair"></div>
</div>
<div class="part-panel">
    <span class="part-label">▶ 服</span>
    <div class="part-options" id="opt-clothes"></div>
</div>
<div class="part-panel">
    <span class="part-label">▶ 武器（右手 X=8, Y=21）</span>
    <div class="part-options" id="opt-weapon"></div>
</div>
<div class="part-panel">
    <span class="part-label">▶ 盾（左手 X=23, Y=21）</span>
    <div class="part-options" id="opt-shield"></div>
</div>

<div class="btn-row">
    <button class="btn-rand" onclick="randomize()">🎲 ランダム</button>
    <button class="btn-save" onclick="saveImage()">💾 PNG保存</button>
</div>

<div class="info">
    <span style="color:#aaa">見下ろし視点・コンパクト体型(実測ベース)</span><br>
    <span style="color:#ff6b6b">■</span> 武器ジョイント X=8,Y=21&nbsp;
    <span style="color:#4dabf7">■</span> 盾ジョイント X=23,Y=21
</div>
</div>

<!-- 読み込み順: base→parts→config→engine（依存関係順） -->
<script src="js/base.js"></script>
<script src="js/parts.js"></script>
<script src="js/config.js"></script>
<script src="js/engine.js"></script>
</body>
</html>
