<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ドット絵 特徴抽出＆量産ジェネレーター（自動縮小版）</title>
    <style>
        body { background: #2c2c2c; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .container { background: #3a3a3a; padding: 20px; border-radius: 8px; max-width: 800px; margin: 0 auto; }
        .canvas-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 20px; }
        canvas { 
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"><rect width="8" height="8" fill="%23ccc"/><rect x="8" y="8" width="8" height="8" fill="%23ccc"/><rect x="8" width="8" height="8" fill="%23fff"/><rect y="8" width="8" height="8" fill="%23fff"/></svg>'); 
            image-rendering: pixelated; box-shadow: 0 4px 8px rgba(0,0,0,0.5); border: 2px solid #555; border-radius: 4px;
        }
        button, input[type="file"] { margin: 10px; padding: 10px 15px; font-size: 16px; cursor: pointer; }
        button { background: #4CAF50; color: white; border: none; border-radius: 4px; font-weight: bold; }
        button:hover { background: #45a049; }
        button:disabled { background: #666; cursor: not-allowed; }
        .hint { color: #aaa; font-size: 14px; text-align: left; margin-bottom: 15px;}
    </style>
</head>
<body>

    <div class="container">
        <h2>ドット絵 特徴抽出ジェネレーター</h2>
        <div class="hint">
            <strong>改良版:</strong> 大きな画像をアップロードしても、自動的にドット絵サイズに縮小して解析します。
        </div>

        <input type="file" id="imageUpload" accept="image/png, image/jpeg">
        <button id="generateBtn" onclick="generate()" disabled>量産する</button>

        <h3>元の画像（解析用サイズ）</h3>
        <canvas id="originalCanvas"></canvas>

        <h3>量産されたバリエーション</h3>
        <div class="canvas-area" id="output"></div>
    </div>

<script>
    let silhouette = []; 
    let colorsByY = [];  
    let markov = {};     
    let imgWidth = 0;
    let imgHeight = 0;

    document.getElementById('imageUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if(!file) return;
        const reader = new FileReader();
        reader.onload = function(event) {
            const img = new Image();
            img.onload = function() { analyzeImage(img); }
            img.src = event.target.result;
        }
        reader.readAsDataURL(file);
    });

    function rgbaToHex(r, g, b, a) {
        if (a < 128) return null; 
        return "#" + (16777216 + (r << 16) + (g << 8) + b).toString(16).slice(1);
    }

    function analyzeImage(img) {
        const canvas = document.getElementById('originalCanvas');
        const ctx = canvas.getContext('2d');
        
        // ★改良ポイント：画像が大きい場合は最大64pxに自動縮小する
        const MAX_SIZE = 64;
        let scale = 1;
        if (img.width > MAX_SIZE || img.height > MAX_SIZE) {
            scale = Math.min(MAX_SIZE / img.width, MAX_SIZE / img.height);
        }
        
        imgWidth = Math.max(1, Math.floor(img.width * scale));
        imgHeight = Math.max(1, Math.floor(img.height * scale));
        
        canvas.width = imgWidth;
        canvas.height = imgHeight;
        
        // 画面上では見やすいように拡大表示（元のサイズ感に合わせる）
        let displayScale = MAX_SIZE / Math.max(imgWidth, imgHeight) * 4;
        canvas.style.width = (imgWidth * displayScale) + "px"; 
        canvas.style.height = (imgHeight * displayScale) + "px";
        
        // 縮小時にドット感がぼやけないように設定
        ctx.imageSmoothingEnabled = false; 
        ctx.drawImage(img, 0, 0, imgWidth, imgHeight);
        
        const data = ctx.getImageData(0, 0, imgWidth, imgHeight).data;
        
        silhouette = [];
        colorsByY = [];
        markov = {};

        for(let y = 0; y < imgHeight; y++) {
            silhouette[y] = [];
            colorsByY[y] = {};
            for(let x = 0; x < imgWidth; x++) {
                const idx = (y * imgWidth + x) * 4;
                const color = rgbaToHex(data[idx], data[idx+1], data[idx+2], data[idx+3]);
                
                silhouette[y][x] = color ? 1 : 0;
                
                if(color) {
                    colorsByY[y][color] = (colorsByY[y][color] || 0) + 1;
                    
                    if (x > 0 && silhouette[y][x-1] === 1) {
                        const prevIdx = (y * imgWidth + (x-1)) * 4;
                        const prevColor = rgbaToHex(data[prevIdx], data[prevIdx+1], data[prevIdx+2], data[prevIdx+3]);
                        if(prevColor) {
                            if(!markov[prevColor]) markov[prevColor] = {};
                            markov[prevColor][color] = (markov[prevColor][color] || 0) + 1;
                        }
                    }
                }
            }
        }
        
        document.getElementById('generateBtn').disabled = false;
        alert("特徴の抽出が完了しました！「量産する」ボタンを押してください。");
    }

    function generate() {
        const outputDiv = document.getElementById('output');
        outputDiv.innerHTML = ""; 
        
        const canvas = document.getElementById('originalCanvas');
        
        for(let i = 0; i < 8; i++) {
            const newCanvas = document.createElement('canvas');
            newCanvas.width = imgWidth;
            newCanvas.height = imgHeight;
            newCanvas.style.width = canvas.style.width;
            newCanvas.style.height = canvas.style.height;
            const ctx = newCanvas.getContext('2d');
            
            let generatedColors = [];
            
            for(let y = 0; y < imgHeight; y++) {
                generatedColors[y] = [];
                for(let x = 0; x < imgWidth; x++) {
                    if(silhouette[y][x] === 1) {
                        let chosenColor = chooseColor(x, y, generatedColors);
                        generatedColors[y][x] = chosenColor;
                        ctx.fillStyle = chosenColor;
                        ctx.fillRect(x, y, 1, 1);
                    } else {
                        generatedColors[y][x] = null;
                    }
                }
            }
            outputDiv.appendChild(newCanvas);
        }
    }

    function chooseColor(x, y, generatedColors) {
        let candidates = {};
        for(let c in colorsByY[y]) candidates[c] = colorsByY[y][c]; 
        
        if (x > 0 && generatedColors[y][x-1]) {
            let leftColor = generatedColors[y][x-1];
            if (markov[leftColor]) {
                for(let c in candidates) {
                    if(markov[leftColor][c]) {
                        candidates[c] *= (markov[leftColor][c] * 10); 
                    } else {
                        candidates[c] *= 0.1; 
                    }
                }
            }
        }
        
        let totalWeight = 0;
        for(let c in candidates) totalWeight += candidates[c];
        if(totalWeight === 0) return Object.keys(colorsByY[y])[0] || "#000000";
        
        let rand = Math.random() * totalWeight;
        for(let c in candidates) {
            rand -= candidates[c];
            if(rand <= 0) return c;
        }
        return Object.keys(candidates)[0];
    }
</script>
</body>
</html>
